<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: #14120b;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: #f7f7f4;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
/* Subtle grid pattern */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(247,247,244,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(247,247,244,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
/* Radial glow */
body::after {
  content: '';
  position: absolute;
  top: -200px;
  right: -100px;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(247,247,244,0.04) 0%, transparent 70%);
}
.container {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 80px;
  padding: 0 80px;
}
.icons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  flex-shrink: 0;
}
.icon-box {
  width: 80px;
  height: 80px;
  border-radius: 16px;
  background: rgba(247,247,244,0.06);
  border: 1px solid rgba(247,247,244,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-box svg {
  width: 36px;
  height: 36px;
  fill: rgba(247,247,244,0.5);
}
.text {
  flex: 1;
}
.title {
  font-size: 52px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 20px;
}
.subtitle {
  font-size: 22px;
  color: rgba(247,247,244,0.55);
  line-height: 1.5;
  margin-bottom: 36px;
}
.badges {
  display: flex;
  gap: 12px;
}
.badge {
  padding: 8px 20px;
  border-radius: 999px;
  border: 1px solid rgba(247,247,244,0.15);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: rgba(247,247,244,0.6);
}
.badge.highlight {
  background: rgba(247,247,244,0.08);
  border-color: rgba(247,247,244,0.2);
  color: rgba(247,247,244,0.85);
}
.footer {
  position: absolute;
  bottom: 28px;
  right: 48px;
  font-size: 13px;
  color: rgba(247,247,244,0.25);
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
  <div class="container">
    <div class="icons">
      <div class="icon-box">
        <svg viewBox="0 0 384 512"><path d="M64 0C28.7 0 0 28.7 0 64L0 448c0 35.3 28.7 64 64 64l256 0c35.3 0 64-28.7 64-64l0-384c0-35.3-28.7-64-64-64L64 0zM96 64l192 0c17.7 0 32 14.3 32 32l0 32c0 17.7-14.3 32-32 32L96 160c-17.7 0-32-14.3-32-32l0-32c0-17.7 14.3-32 32-32zm16 168a24 24 0 1 1 -48 0 24 24 0 1 1 48 0zm80 24a24 24 0 1 1 0-48 24 24 0 1 1 0 48zm128-24a24 24 0 1 1 -48 0 24 24 0 1 1 48 0zM88 352a24 24 0 1 1 0-48 24 24 0 1 1 0 48zm128-24a24 24 0 1 1 -48 0 24 24 0 1 1 48 0zm80 24a24 24 0 1 1 0-48 24 24 0 1 1 0 48zM64 424c0-13.3 10.7-24 24-24l112 0c13.3 0 24 10.7 24 24s-10.7 24-24 24L88 448c-13.3 0-24-10.7-24-24z"/></svg>
      </div>
      <div class="icon-box">
        <svg viewBox="0 0 512 512"><path d="M64 32C28.7 32 0 60.7 0 96L0 384c0 35.3 28.7 64 64 64l384 0c35.3 0 64-28.7 64-64l0-192c0-35.3-28.7-64-64-64L72 128c-13.3 0-24-10.7-24-24S58.7 80 72 80l384 0c13.3 0 24-10.7 24-24s-10.7-24-24-24L64 32zM416 256a32 32 0 1 1 0 64 32 32 0 1 1 0-64z"/></svg>
      </div>
      <div class="icon-box">
        <svg viewBox="0 0 512 512"><path d="M48 56c0-13.3-10.7-24-24-24S0 42.7 0 56L0 400c0 44.2 35.8 80 80 80l408 0c13.3 0 24-10.7 24-24s-10.7-24-24-24L80 432c-17.7 0-32-14.3-32-32L48 56zM473 169c9.4-9.4 9.4-24.6 0-33.9s-24.6-9.4-33.9 0l-119 119-79-79c-9.4-9.4-24.6-9.4-33.9 0L103 279c-9.4 9.4-9.4 24.6 0 33.9s24.6 9.4 33.9 0l87-87 79 79c9.4 9.4 24.6 9.4 33.9 0L473 169z"/></svg>
      </div>
      <div class="icon-box">
        <svg viewBox="0 0 576 512"><path d="M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 128-168 0c-13.3 0-24 10.7-24 24s10.7 24 24 24l168 0 0 112c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64zM384 160l-128 0L256 0 384 160z"/></svg>
      </div>
    </div>
    <div class="text">
      <h1 class="title">Cursor Cost<br>Calculator</h1>
      <p class="subtitle">Estimate your AI coding costs across plans. Import CSVs. Find your best plan.</p>
      <div class="badges">
        <span class="badge">PRO</span>
        <span class="badge highlight">PRO PLUS</span>
        <span class="badge">ULTRA</span>
      </div>
    </div>
  </div>
  <div class="footer">jasonholtdigital.com</div>
</body>
</html>
